SPDX-License-Identifier = "Apache-2.0"

[[annotations]]
path = [
  "web/.gitignore",
  "web/.prettierrc",
  "web/CLAUDE.md",
  "web/README.md",
  "web/appProps.example.json",
  "web/appProps.template.json",
