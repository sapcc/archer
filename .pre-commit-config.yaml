repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
  - repo: https://github.com/renovatebot/pre-commit-hooks
    rev: 40.49.5
    hooks:
      - id: renovate-config-validator
  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
      - id: go-imports
      - id: go-mod-tidy
  - repo: local
    hooks:
      - id: go-unit
        name: go unit tests
        entry: sh -c "gmake check || make check"
        language: system
        pass_filenames: false
        files: '\.go$|^go\.(mod|sum)$|^Makefile|^Makefile\.maker\.yaml$'
      - id: swagger
        name: swagger
        entry: sh -c "gmake swagger || make swagger"
        language: system
        pass_filenames: false
        files: '^swagger\.yaml$'
      - id: go-build
        name: go build
        entry: sh -c "gmake build-all || make build-all"
        language: system
        pass_filenames: false
        files: '\.go$|^go\.(mod|sum)$|^Makefile|^Makefile\.maker\.yaml$'
      - id: web-format
        name: web prettier check
        entry: sh -c "cd web && pnpm check-format"
        language: system
        pass_filenames: false
        files: '^web/.*\.(ts|tsx|md)$'
      - id: web-typecheck
        name: web typecheck
        entry: sh -c "cd web && pnpm typecheck"
        language: system
        pass_filenames: false
        files: '^web/.*\.(ts|tsx)$|^web/tsconfig\.json$|^web/package\.json$'
