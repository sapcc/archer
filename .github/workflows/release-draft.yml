name: Release - Draft GitHub Release

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  draft-release:
    name: Draft GitHub Release
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'chore/release-next'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get latest version from changelog
        id: version
        uses: release-flow/keep-a-changelog-action@main
        with:
          command: query
          version: latest

      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: v${{ steps.version.outputs.version }}
          RELEASE_NOTES: ${{ steps.version.outputs.release-notes }}
        run: |
          if gh release view "${VERSION}" >/dev/null 2>&1; then
            echo "Release ${VERSION} already exists, skipping"
            exit 0
          fi

          gh release create "${VERSION}" \
            --draft \
            --title "${VERSION}" \
            --notes "${RELEASE_NOTES}"
