swagger: "2.0"
info:
  version: "2.5.2"
  title: "🏹 Archer"
  contact:
    name: SAP SE / Converged Cloud
    url: https://sap.com
  license:
    name: "Apache 2.0"
    url: "https://www.apache.org/licenses/LICENSE-2.0.html"
  x-logo:
    url: "https://avatars.githubusercontent.com/u/4242847"
    backgroundColor: "#FFFFFF"
    altText: "Archer logo"
  description: |
    # Documentation
    Archer is an OpenStack-style API service that privately connects services across [OpenStack Networks](https://docs.openstack.org/neutron/latest/admin/intro-os-networking.html). Consumers pick a *service* from a catalog and **inject** it into their own network — the service becomes reachable through a private IP, without exposing either network to the other.

    Archer integrates with *OpenStack Keystone* for authentication and *OpenStack Neutron* for network and port management.

    ### Concepts
    Archer exposes two resource types:

    * **Services** — private or public services registered in Archer. They are reached by creating an endpoint.
    * **Endpoints** — IP endpoints in a local network that transparently forward to a service living in another private network.

    ### Features
    * Multi-tenant via OpenStack Identity
    * OpenStack `policy.json` access policies
    * Prometheus exporter
    * Rate limiting and CORS
    * CADF-compatible audit trail
    * Sentry error reporting
    * OpenStack-style CLI client (`archerctl`)

    ### Supported Backends
    * **F5 BigIP** — provisioned via the `archer-f5-agent`
    * **Network Injection** — the `archer-ni-agent`, using HAProxy inside Linux network namespaces; works alongside `openvswitch-agent` or `linuxbridge-agent`

    ### Requirements
    * PostgreSQL
    * OpenStack Keystone
    * OpenStack Neutron

    ## API properties
    Archer exposes a RESTful HTTP API.

    #### Request / Response format
    Requests and responses use JSON. `POST` requests must set `Content-Type: application/json`; responses always come back with `Content-Type: application/json`.

    #### Authentication
    Archer uses OpenStack Keystone. Requests must include a Keystone token in the `X-Auth-Token` header. Because the project ID is derived from the token, `project_id` is not required on create requests.

    #### Pagination
    List operations return a bounded number of items. Navigate the collection with URI parameters:

    ```
    ?limit=100&marker=1234&page_reverse=False
    ```

    * `marker` — the ID of the last item from the previous page
    * `limit` — page size (clamped to the deployment maximum)
    * `page_reverse` — reverse pagination direction

    Responses include atom `next` and `previous` links. The final forward page has no `next`; the final reverse page has no `previous`. Deployments advertise pagination support through the `pagination` capability on the API detail endpoint.

    #### Sorting
    Use `sort` with a comma-separated list of keys, in priority order. Prefix a key with `-` to sort descending:

    ```
    ?sort=key1,-key2,key3
    ```

    Sort support is advertised through the `sort` capability on the API detail endpoint.

    #### Filtering by tags
    Most resources (services, endpoints, …) accept tags. Archer supports four tag filters on list operations:

    * `tags` — entities that have **all** the given tags
    * `tags-any` — entities that have **any** of the given tags
    * `not-tags` — entities that do **not** have all of the given tags
    * `not-tags-any` — entities that do **not** have any of the given tags

    Each tag is limited to 64 characters. Filters can be combined:

    ```
    ?tags=red,blue&tags-any=green,orange
    ```

    #### Response Codes (Faults)

    | Code  | Description       |
    | ----- | ----------------- |
    | 400   | Validation error |
    | 401   | Unauthorized |
    | 403   | Policy denies the action, or the project is over quota |
    | 404   | Resource not found |
    | 409   | Conflict |
    | 422   | Unprocessable Entity |
    | 429   | Rate limit exceeded |
    | 500   | Internal server error |

    ## Endpoint identification

    Archer supports the Proxy Protocol v2 for endpoint identification.

    The Proxy Protocol is a widely used protocol for passing client connection information through a load balancer to the backend server. It is used to identify the original client IP address and port number. The Proxy Protocol v2 is a binary protocol that is more efficient than the original text-based Proxy Protocol v1.

    The proxy protocol header also includes the ID of the endpoint. This information is encoded using a custom Type-Length-Value (TLV) vector as follows.

    | Field | Length (Octets) | Description                                                    |
    | ----- | --------------- | -------------------------------------------------------------- |
    | Type  | 1               | PP2_TYPE_SAPCC (0xEC)                                          |
    | Length| 2               | Length of the value (UUIDv4 is always 36 byte as ASCII string) |
    | Value | 36              | ASCII UUID of the endpoint                                     |

externalDocs:
  description: GitHub
  url: https://github.com/sapcc/archer
consumes:
  - application/json
produces:
  - application/json
tags:
  - name: Version
    description: |
      ### Version API
      Lists information of enabled Archer capabilities.
  - name: Service
    description: |
      ### Services
      Services are for publishing TCP/UDP services using internal IP addresses in your private network.
  - name: Endpoint
    description: |
      ### Endpoints
      Endpoints are for accessing existing Services using internal IP addresses in your private network.
  - name: RBAC
    x-go-name: rbac
    description: |
      ### RBAC Policies
      RBAC Policies are used to provide service visibility to specific project or domains.
  - name: Quota
    description: |
      ### Quota Operations
      Administrative API for listing and setting quotas for services and endpoints.
  - name: Agent
    description: |
      ### Agent Operations
      Administrative API for viewing registered Archer agents.
schemes:
  - "https"
  - "http"
security:
  - "X-Auth-Token": []
  - {}
securityDefinitions:
  "X-Auth-Token":
    type: "apiKey"
    description: |
      The **Archer API** uses the OpenStack Identity service as the default authentication service. When Keystone is enabled, users that submit requests to the OpenStack Networking service must provide an authentication token in `X-Auth-Token` request header.
      You obtain the token by authenticating to the Keystone endpoint.
    name: "X-Auth-Token"
    in: "header"
paths:
  /:
    get:
      security: []
      tags:
        - Version
      summary: Shows Keystone-compatible version information for Archer API
      description: |
        Returns version information in a Keystone-compatible format.
        The response follows the OpenStack version discovery format with
        versions array containing version objects with id, status, and links.
      responses:
        200:
          description: Versions
          schema:
            $ref: "#/definitions/Versions"
  /service:
    get:
      tags:
        - Service
      summary: List services
      x-policy: service:read
      parameters:
        - $ref: '#/parameters/marker'
        - $ref: '#/parameters/limit'
        - $ref: '#/parameters/sort'
        - $ref: '#/parameters/page_reverse'
        - $ref: '#/parameters/tags'
        - $ref: '#/parameters/tags-any'
        - $ref: '#/parameters/not-tags'
        - $ref: '#/parameters/not-tags-any'
        - $ref: '#/parameters/project_id'
      responses:
        200:
          description: An array of services.
          schema:
            type: object
            properties:
              links:
                x-omitempty: true
                type: array
                items:
                  $ref: '#/definitions/Link'
              items:
                type: array
                items:
                  $ref: "#/definitions/Service"
        400:
          description: Bad request
          schema:
            $ref: "#/definitions/Error"
        401:
          description: Unauthorized
          schema:
            $ref: "#/definitions/Error"
        403:
          description: Forbidden
        422:
          description: Unprocessable Content
          schema:
            $ref: "#/definitions/Error"
    post:
      tags:
        - Service
      summary: Add a new service to the catalog
      x-policy: service:create
      parameters:
        - in: body
          name: body
          description: Service object that needs to be added to the catalog
          required: true
          schema:
            $ref: "#/definitions/Service"
      responses:
        201:
          description: Service
          schema:
            $ref: "#/definitions/Service"
          headers:
            X-Target-Id:
              type: string
              format: uuid
              description: "The UUID of the created resource"
        400:
          description: Bad Request
          schema:
            $ref: "#/definitions/Error"
        401:
          description: Unauthorized
          schema:
            $ref: "#/definitions/Error"
        403:
          description: Forbidden
          schema:
            $ref: "#/definitions/Error"
        409:
          description: Duplicate entry
          schema:
            $ref: "#/definitions/Error"
        422:
          description: Unprocessable Content
          schema:
            $ref: "#/definitions/Error"
  /service/{service_id}:
    parameters:
      - in: path
        name: service_id
        required: true
        type: string
        format: uuid
        description: The UUID of the service
    get:
      tags:
        - Service
      summary: Show details of an service
      x-policy: service:read
      responses:
        200:
          description: Service
          schema:
            $ref: "#/definitions/Service"
        401:
          description: Unauthorized
          schema:
            $ref: "#/definitions/Error"
        403:
          description: Forbidden
        404:
          description: Not Found
          schema:
            $ref: "#/definitions/Error"
        422:
          description: Unprocessable Content
          schema:
            $ref: "#/definitions/Error"
    put:
      tags:
        - Service
      summary: Update an existing service
      x-policy: service:update
      parameters:
        - in: body
          name: body
          description: Service object that needs to be updated
          required: true
          schema:
            $ref: "#/definitions/ServiceUpdatable"
      responses:
        200:
          description: Service
          schema:
            $ref: "#/definitions/Service"
        400:
          description: Bad Request
          schema:
            $ref: "#/definitions/Error"
        401:
          description: Unauthorized
          schema:
            $ref: "#/definitions/Error"
        403:
          description: Forbidden
        404:
          description: Not Found
          schema:
            $ref: "#/definitions/Error"
        409:
          description: Duplicate entry
          schema:
            $ref: "#/definitions/Error"
        422:
          description: Unprocessable Content
          schema:
            $ref: "#/definitions/Error"
    delete:
      tags:
        - Service
      summary: Remove service from catalog
      x-policy: service:delete
      description: |
        Deletes this service. There **must** be no active associated endpoint for successfully deleting the service,
        unless the `cascade` query parameter is set to `true`.

        With `cascade=true`, all associated endpoints will be automatically set to PENDING_DELETE status
        along with the service, allowing for complete cleanup without manually rejecting endpoints first.

        Without cascade, active endpoints can be rejected by the service owner via the `/service/{service_id}/reject_endpoints` API.
      parameters:
        - in: query
          name: cascade
          type: boolean
          default: false
          description: If true, automatically delete all associated endpoints along with the service.
      responses:
        202:
          description: Delete request successfully accepted.
        404:
          description: Not Found
          schema:
            $ref: "#/definitions/Error"
        401:
          description: Unauthorized
          schema:
            $ref: "#/definitions/Error"
        403:
          description: Forbidden
        409:
          description: In use.
          schema:
            $ref: "#/definitions/Error"
        422:
          description: Unprocessable Content
          schema:
            $ref: "#/definitions/Error"
  /service/{service_id}/migrate:
    parameters:
      - in: path
        name: service_id
        required: true
        type: string
        format: uuid
        description: The UUID of the service
    post:
      tags:
        - Service
      summary: Migrate service to a different agent
      x-policy: service:migrate
      description: |
        Migrates a service from its current agent to a different agent.
        The service will be set to PENDING_UPDATE status and all its endpoints
        will be re-provisioned on the new agent.

        If target_host is not specified, the least-loaded agent in the same
        availability zone is automatically selected.
      parameters:
        - in: body
          name: body
          required: false
          schema:
            type: object
            properties:
              target_host:
                type: string
                description: Target agent hostname. If not specified, least-loaded agent is selected.
      responses:
        200:
          description: Service migration initiated
          schema:
            $ref: "#/definitions/Service"
        400:
          description: Bad request (e.g., same host, invalid target)
          schema:
            $ref: "#/definitions/Error"
        401:
          description: Unauthorized
          schema:
            $ref: "#/definitions/Error"
        403:
          description: Forbidden
        404:
          description: Service or target agent not found
          schema:
            $ref: "#/definitions/Error"
        409:
          description: Conflict (e.g., no available agents)
          schema:
            $ref: "#/definitions/Error"
  /service/{service_id}/endpoints:
    parameters:
      - in: path
        name: service_id
        required: true
        type: string
        format: uuid
        description: The UUID of the service
    get:
      tags:
        - Service
      summary: List service endpoints consumers
      x-policy: service-endpoint:read
      description: |
        Provides a list of service consumers (endpoints).

        This list can be used to accept or reject requests, or disable active endpoints.
        Rejected endpoints will be cleaned up after a specific time.
      parameters:
        - $ref: '#/parameters/marker'
        - $ref: '#/parameters/limit'
        - $ref: '#/parameters/sort'
        - $ref: '#/parameters/page_reverse'
      responses:
        200:
          description: An array of service endpoint consumers.
          schema:
            type: object
            properties:
              links:
                x-omitempty: true
                type: array
                items:
                  $ref: '#/definitions/Link'
              items:
                type: array
                items:
                  $ref: "#/definitions/EndpointConsumer"
        400:
          description: Bad request
          schema:
            $ref: "#/definitions/Error"
        401:
          description: Unauthorized
          schema:
            $ref: "#/definitions/Error"
        403:
          description: Forbidden
        404:
          description: Not Found
          schema:
            $ref: "#/definitions/Error"
        422:
          description: Unprocessable Content
          schema:
            $ref: "#/definitions/Error"
  /service/{service_id}/accept_endpoints:
    parameters:
      - in: path
        name: service_id
        required: true
        type: string
        format: uuid
        description: The UUID of the service
    put:
      summary: Accept endpoints
      x-policy: service-endpoint:accept
      description: |
        Specify a list of endpoint consumers (`endpoint_ids` and/or `project_ids`) whose endpoints should be accepted.
        * Existing active endpoints will be untouched.
        * Rejected endpoints will be accepted.
        * Pending endpoints will be accepted.
      tags:
        - Service
      parameters:
        - in: body
          name: body
          description: Service object that needs to be updated
          required: true
          schema:
            $ref: "#/definitions/EndpointConsumerList"
      responses:
        200:
          description: Ok
          schema:
            type: array
            items:
              $ref: "#/definitions/EndpointConsumer"
        400:
          description: Must declare at least one, endpoint_id(s) or project_id(s)
          schema:
            $ref: "#/definitions/Error"
        401:
          description: Unauthorized
          schema:
            $ref: "#/definitions/Error"
        403:
          description: Forbidden
          schema:
            $ref: "#/definitions/Error"
        404:
          description: Not Found
        422:
          description: Unprocessable Content
          schema:
            $ref: "#/definitions/Error"
  /service/{service_id}/reject_endpoints:
    parameters:
      - in: path
        name: service_id
        required: true
        type: string
        format: uuid
        description: The UUID of the service
    put:
      summary: Reject endpoints
      x-policy: service-endpoint:reject
      description: |
        Specify a list of consumers (`endpoint_ids` and/or `project_ids`) whose endpoints should be rejected.
        * Existing active endpoints will be rejected.
        * Rejected endpoints will be untouched.
        * Pending endpoints will be rejected.
      tags:
        - Service
      parameters:
        - in: body
          name: body
          description: Service object that needs to be updated
          required: true
          schema:
            $ref: "#/definitions/EndpointConsumerList"
      responses:
        200:
          description: Ok
          schema:
            type: array
            items:
              $ref: "#/definitions/EndpointConsumer"
        400:
          description: Must declare at least one, endpoint_id(s) or project_id(s)
          schema:
            $ref: "#/definitions/Error"
        401:
          description: Unauthorized
          schema:
            $ref: "#/definitions/Error"
        403:
          description: Forbidden
          schema:
            $ref: "#/definitions/Error"
        404:
          description: Not Found
        422:
          description: Unprocessable Content
          schema:
            $ref: "#/definitions/Error"

  /endpoint:
    get:
      tags:
        - Endpoint
      summary: List existing service endpoints
      x-policy: endpoint:read
      parameters:
        - $ref: '#/parameters/marker'
        - $ref: '#/parameters/limit'
        - $ref: '#/parameters/sort'
        - $ref: '#/parameters/page_reverse'
        - $ref: '#/parameters/tags'
        - $ref: '#/parameters/tags-any'
        - $ref: '#/parameters/not-tags'
        - $ref: '#/parameters/not-tags-any'
        - $ref: '#/parameters/project_id'
      responses:
        200:
          description: An array of endpoints.
          schema:
            type: object
            properties:
              links:
                x-omitempty: true
                type: array
                items:
                  $ref: '#/definitions/Link'
              items:
                type: array
                items:
                  $ref: "#/definitions/Endpoint"
        400:
          description: Bad request
          schema:
            $ref: "#/definitions/Error"
        401:
          description: Unauthorized
          schema:
            $ref: "#/definitions/Error"
        403:
          description: Forbidden
        422:
          description: Unprocessable Content
          schema:
            $ref: "#/definitions/Error"
    post:
      tags:
        - Endpoint
      summary: Create endpoint for accessing a service
      x-policy: endpoint:create
      parameters:
        - in: body
          name: body
          description: Service and target network to inject. Only one of `target_network`, `target_subnet` or `target_port` must be specified.
          required: true
          schema:
            $ref: "#/definitions/Endpoint"
      responses:
        201:
          description: Endpoint
          schema:
            $ref: "#/definitions/Endpoint"
          headers:
            X-Target-Id:
              type: string
              format: uuid
              description: "The UUID of the created resource"
        400:
          description: Bad request
          schema:
            $ref: "#/definitions/Error"
        401:
          description: Unauthorized
          schema:
            $ref: "#/definitions/Error"
        403:
          description: Forbidden
          schema:
            $ref: "#/definitions/Error"
        422:
          description: Unprocessable Content
          schema:
            $ref: "#/definitions/Error"
  /endpoint/{endpoint_id}:
    parameters:
      - in: path
        name: endpoint_id
        required: true
        type: string
        format: uuid
        description: The UUID of the endpoint
    get:
      tags:
        - Endpoint
      summary: Show existing service endpoint
      x-policy: endpoint:read
      responses:
        200:
          description: An endpoint detail.
          schema:
            $ref: "#/definitions/Endpoint"
        401:
          description: Unauthorized
          schema:
            $ref: "#/definitions/Error"
        403:
          description: Forbidden
          schema:
            $ref: "#/definitions/Error"
        404:
          description: Not Found
        422:
          description: Unprocessable Content
          schema:
            $ref: "#/definitions/Error"
    put:
      tags:
        - Endpoint
      summary: Update an existing endpoint
      x-policy: endpoint:update
      parameters:
        - in: body
          name: body
          description: Endpoint object that needs to be updated
          required: true
          schema:
            type: object
            properties:
              tags:
                type: array
                description: The list of tags on the resource.
                x-nullable: true
                items:
                  type: string
                  maxLength: 128
              name:
                type: string
                description: Name of the endpoint.
                example: Example endpoint.
                maxLength: 64
                x-nullable: true
              description:
                type: string
                description: Description of the endpoint.
                example: An example of an endpoint.
                maxLength: 255
                x-nullable: true
              connection_mirroring:
                type: boolean
                description: |
                  Enable BIG-IP connection mirroring for high availability failover.
                  **Note: This option currently only affects endpoints for services with provider type `tenant`.**
                x-nullable: true
      responses:
        200:
          description: Endpoint
          schema:
            $ref: "#/definitions/Endpoint"
        401:
          description: Unauthorized
          schema:
            $ref: "#/definitions/Error"
        403:
          description: Forbidden
          schema:
            $ref: "#/definitions/Error"
        404:
          description: Not Found
          schema:
            $ref: "#/definitions/Error"
        422:
          description: Unprocessable Content
          schema:
            $ref: "#/definitions/Error"
    delete:
      tags:
        - Endpoint
      summary: Remove an existing endpoint
      x-policy: endpoint:delete
      responses:
        202:
          description: Delete request successfully accepted.
        401:
          description: Unauthorized
          schema:
            $ref: "#/definitions/Error"
        403:
          description: Forbidden
          schema:
            $ref: "#/definitions/Error"
        404:
          description: Not Found
        422:
          description: Unprocessable Content
          schema:
            $ref: "#/definitions/Error"

  /rbac-policies:
    get:
      tags:
        - RBAC
      summary: List RBAC policies
      x-policy: rbac-policy:read
      parameters:
        - $ref: '#/parameters/marker'
        - $ref: '#/parameters/limit'
        - $ref: '#/parameters/sort'
        - $ref: '#/parameters/page_reverse'
      responses:
        200:
          description: A JSON array of rbac policies
          schema:
            type: object
            properties:
              links:
                x-omitempty: true
                type: array
                items:
                  $ref: '#/definitions/Link'
              items:
                type: array
                items:
                  $ref: "#/definitions/RBACPolicy"
        400:
          description: Bad request
          schema:
            $ref: "#/definitions/Error"
        401:
          description: Unauthorized
          schema:
            $ref: "#/definitions/Error"
        403:
          description: Forbidden
        422:
          description: Unprocessable Content
          schema:
            $ref: "#/definitions/Error"
    post:
      tags:
        - RBAC
      summary: Create RBAC policy
      x-policy: rbac-policy:create
      parameters:
        - in: body
          name: body
          description: RBAC Policy
          required: true
          schema:
            $ref: "#/definitions/RBACPolicy"
      responses:
        201:
          description: RBAC policy
          schema:
            $ref: '#/definitions/RBACPolicy'
          headers:
            X-Target-Id:
              type: string
              format: uuid
              description: "The UUID of the created resource"
        401:
          description: Unauthorized
          schema:
            $ref: "#/definitions/Error"
        403:
          description: Forbidden
        404:
          description: service_id not found
        409:
          description: Duplicate RBAC Policy
          schema:
            $ref: "#/definitions/Error"
        422:
          description: Unprocessable Content
          schema:
            $ref: "#/definitions/Error"
  /rbac-policies/{rbac_policy_id}:
    parameters:
      - in: path
        name: rbac_policy_id
        required: true
        type: string
        format: uuid
        description: The UUID of the RBAC policy.
    get:
      tags:
        - RBAC
      summary: Show details of an RBAC policy
      x-policy: rbac-policy:read
      responses:
        200:
          description: RBAC Policy
          schema:
            $ref: '#/definitions/RBACPolicy'
        401:
          description: Unauthorized
          schema:
            $ref: "#/definitions/Error"
        403:
          description: Forbidden
        404:
          description: Not Found
          schema:
            $ref: "#/definitions/Error"
        422:
          description: Unprocessable Content
          schema:
            $ref: "#/definitions/Error"
    put:
      tags:
        - RBAC
      summary: Update an existing RBAC policy
      x-policy: rbac-policy:update
      parameters:
        - in: body
          name: body
          description: RBAC policy resource that needs to be updated
          required: true
          schema:
            $ref: "#/definitions/RBACPolicyCommon"
      responses:
        200:
          description: RBAC Policy
          schema:
            $ref: "#/definitions/RBACPolicy"
        401:
          description: Unauthorized
          schema:
            $ref: "#/definitions/Error"
        403:
          description: Forbidden
        404:
          description: Not Found
          schema:
            $ref: "#/definitions/Error"
        409:
          description: Duplicate RBAC Policy
          schema:
            $ref: "#/definitions/Error"
        422:
          description: Unprocessable Content
          schema:
            $ref: "#/definitions/Error"
    delete:
      tags:
        - RBAC
      summary: Delete RBAC policy
      x-policy: rbac-policy:delete
      responses:
        204:
          description: RBAC policy successfully deleted.
        401:
          description: Unauthorized
          schema:
            $ref: "#/definitions/Error"
        403:
          description: Forbidden
        404:
          description: Not Found
          schema:
