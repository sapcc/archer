        401:
          description: Unauthorized
          schema:
            $ref: "#/definitions/Error"
        403:
          description: Forbidden
        422:
          description: Unprocessable Content
          schema:
            $ref: "#/definitions/Error"
  /quotas/{project_id}:
    parameters:
      - in: path
        name: project_id
