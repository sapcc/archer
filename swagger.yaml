parameters:
  marker:
    name: marker
    in: query
    type: string
    format: uuid
    description: Pagination ID of the last item in the previous list.
  limit:
    name: limit
    in: query
    type: integer
    description: Sets the page size.
    minimum: 1
  sort:
    name: sort
    in: query
    type: string
    description: Comma-separated list of sort keys, optionally prefix with - to reverse sort order.
    maxLength: 256
  page_reverse:
    name: page_reverse
    in: query
    type: boolean
    description: Sets the page direction.
  tags:
    name: tags
    in: query
    type: array
    description: |
      Filter for tags, multiple tags are considered as logical AND.
      Should be provided in a comma separated list.
    items:
      type: string
      maxLength: 128
  tags-any:
    name: tags-any
    in: query
    type: array
    description: |
      Filter for tags, multiple tags are considered as logical OR.
      Should be provided in a comma separated list.
    items:
      type: string
      maxLength: 128
  not-tags:
    name: not-tags
    in: query
    type: array
    description: |
      Filter for resources not having tags, multiple not-tags are considered as logical AND.
      Should be provided in a comma separated list.
    items:
      type: string
      maxLength: 128
  not-tags-any:
    name: not-tags-any
    in: query
    type: array
    description: |
      Filter for resources not having tags, multiple tags are considered as logical OR.
      Should be provided in a comma separated list.
    items:
      type: string
      maxLength: 128
  project_id:
    name: project_id
    in: query
    type: string
    description: |
      Filter for resources belonging or accessible by a specific project.
    maxLength: 36

definitions:
  Service:
    required:
      - ports
      - ip_addresses
    type: object
    properties:
      id:
        type: string
        format: uuid
        description: The ID of the resource.
        readOnly: true
      enabled:
        type: boolean
        description: Enable/disable this service. Existing endpoints are not touched by this.
        default: true
      name:
        type: string
        description: Name of the service.
        example: ExampleService
        maxLength: 64
        x-omitempty: false
      description:
        type: string
        description: Description of the service.
        example: An example of an Service.
        maxLength: 255
        x-omitempty: false
      ports:
        type: array
        items:
          type: integer
          format: int32
          minimum: 1
          maximum: 65535
          example: 80
        description: Ports exposed by the service.
        x-nullable: false
        minItems: 1
        uniqueItems: true
      network_id:
        type: string
        format: uuid
        description: Network ID of the network that provides this service. Required for tenant provider, optional for cp provider.
        x-nullable: true
      ip_addresses:
        type: array
        description: IP Addresses of the providing service (IPv4 or IPv6), multiple addresses will be round robin load balanced.
        minItems: 1
        items:
          type: string
          x-go-type:
            type: InetAddress
          description: IP Address of the providing service (IPv4 or IPv6).
          example: 1.2.3.4
      status:
        $ref: "#/definitions/ServiceStatus"
      require_approval:
        type: boolean
        description: Require explicit project approval for the service owner.
        default: false
      visibility:
        type: string
        description: Set global visibility of the service. For `private` visibility, RBAC policies can extend the visibility to specific projects.
        default: private
        enum:
          - private
          - public
      availability_zone:
        type: string
        description: >-
          Availability zone of this service. If set to null, the service will
          be configured as a cross-AZ (cross-availability-zone) service,
          providing redundancy across all availability zones. Cross-AZ
          services are only supported in specific regions and providers that
          have cross-AZ agents deployed. If no cross-AZ agent is available
          for the requested region/provider, service creation will fail with
          a "No available host agent found" error.
        example: AZ-A
        maxLength: 64
        x-nullable: true
        x-omitempty: false
      host:
        type: string
        description: Device host.
        maxLength: 64
        readOnly: true
        x-nullable: true
      proxy_protocol:
        type: boolean
        default: true
        description: Proxy protocol v2 enabled for this service.
      tags:
        type: array
        description: The list of tags on the resource.
        x-nullable: true
        items:
          type: string
          maxLength: 128
      provider:
        type: string
        description: Provider type, defaults to tenant type.
        default: tenant
        enum:
          - tenant
          - cp
        x-nullable: true
      protocol:
        type: string
        description: |
          Protocol type of the service.

          ### protocol can be one of
          | protocol         | Description                            |
          | ---------------- | -------------------------------------- |
          | HTTP             | Service is HTTP based                  |
          | TCP              | Service is TCP based                   |
        enum:
          - HTTP
          - TCP
        default: HTTP
        x-nullable: true
      created_at:
        $ref: "#/definitions/Timestamp"
      updated_at:
        $ref: "#/definitions/Timestamp"
      project_id:
        $ref: "#/definitions/Project"
      health_status:
        type: string
        description: |
          Health monitor status of the service backend.

          ### Health status can be one of
          | Status      | Description                              |
          | ----------- | ---------------------------------------- |
          | ONLINE      | Service is healthy                       |
          | DEGRADED    | Service is partially healthy             |
          | OFFLINE     | Service is not healthy                   |
          | UNCHECKED   | Status cannot be determined              |
        enum:
          - ONLINE
          - DEGRADED
          - OFFLINE
          - UNCHECKED
        readOnly: true
        x-nullable: true
      snat_pool_size:
        type: integer
        format: int32
        minimum: 1
        maximum: 8
        x-nullable: true
        x-omitempty: true
        description: >
          Number of SNAT IP addresses allocated for this service. Increase to
          scale outbound port capacity. Defaults to 1 when omitted on create.
          The cp provider does not support custom values.
  ServiceStatus:
    type: string
    description: |
      Status of the service.

      ### Status can be one of
      | Status           | Description                            |
      | ---------------- | -------------------------------------- |
      | AVAILABLE        | Service is ready for consumption.      |
      | PENDING_CREATE   | Service is being set up                |
      | PENDING_UPDATE   | Service is being updated               |
      | PENDING_DELETE   | Service is being deleted               |
      | UNAVAILABLE      | Service is unavailable (e.g. disabled) |
      | ERROR_QUOTA      | Service has not enough port quota      |
    enum:
      - AVAILABLE
      - PENDING_CREATE
      - PENDING_UPDATE
      - PENDING_DELETE
      - UNAVAILABLE
      - ERROR_QUOTA
    readOnly: true
  ServiceUpdatable:
    type: object
    properties:
      enabled:
        type: boolean
        description: Enable/disable this service. Existing endpoints are not touched by this.
        x-nullable: true
      name:
        type: string
        description: Name of the service.
        example: ExampleService
        maxLength: 64
        x-nullable: true
      description:
        type: string
        description: Description of the service.
        example: An example of an Service.
        maxLength: 255
        x-nullable: true
      ip_addresses:
        type: array
        description: IP Addresses of the providing service (IPv4 or IPv6), multiple addresses will be round robin load balanced.
        minItems: 1
        items:
          type: string
          x-go-type:
            type: InetAddress
          description: IP Address of the providing service (IPv4 or IPv6).
          example: 1.2.3.4
      ports:
        type: array
        items:
          type: integer
          format: int32
          minimum: 1
          maximum: 65535
          example: 80
        description: Ports exposed by the service.
        minItems: 0
        uniqueItems: true
      require_approval:
        type: boolean
        description: Require explicit project approval for the service owner.
        x-nullable: true
      visibility:
        type: string
        description: Set global visibility of the service. For `private` visibility, RBAC policies can extend the visibility to specific projects.
        enum:
          - private
          - public
        x-nullable: true
      proxy_protocol:
        type: boolean
        description: Proxy protocol v2 enabled for this service.
        x-nullable: true
      protocol:
        type: string
        description: |
          Protocol type of the service.

          ### protocol can be one of
          | protocol         | Description                            |
          | ---------------- | -------------------------------------- |
          | HTTP             | Service is HTTP based                  |
          | TCP              | Service is TCP based                   |
        enum:
          - HTTP
          - TCP
        x-nullable: true
      tags:
        type: array
        description: The list of tags on the resource.
        items:
          type: string
          maxLength: 128
      snat_pool_size:
        type: integer
        format: int32
        minimum: 1
        maximum: 8
        x-nullable: true
        x-omitempty: true
        description: >
          Number of SNAT IP addresses allocated for this service. Increase to
          scale outbound port capacity. Omit to leave the current value
          unchanged. The cp provider does not support custom values.
  EndpointConsumer:
    type: object
    properties:
      id:
        type: string
        format: uuid
        description: The ID of the resource.
        readOnly: true
      status:
        $ref: "#/definitions/EndpointStatus"
      project_id:
        $ref: "#/definitions/Project"
  EndpointConsumerList:
    type: object
    description: list of consumer ids.
    properties:
      endpoint_ids:
        type: array
        items:
          type: string
          format: uuid
          description: The ID of a service endpoint consumer.
      project_ids:
        type: array
        items:
          $ref: "#/definitions/Project"
  Endpoint:
    type: object
    properties:
      id:
        type: string
        format: uuid
        description: The ID of the resource.
        readOnly: true
      service_id:
        type: string
        format: uuid
        description: The ID of the service.
      name:
        type: string
        description: Name of the endpoint.
        example: Example endpoint.
        maxLength: 64
        x-omitempty: false
      description:
        type: string
        description: Description of the endpoint.
        example: An example of an endpoint.
        maxLength: 255
        x-omitempty: false
      target:
        type: object
        description: Endpoint target
        x-nullable: false
        properties:
          network:
            type: string
            format: uuid
            description: Endpoint network target. One of `target_network`, `target_subnet` or `target_port` must be specified.
            example: 49b6480b-24d3-4376-a4c9-aecbb89e16d9
            x-nullable: true
          subnet:
            type: string
            format: uuid
            description: Endpoint subnet target. One of `target_network`, `target_subnet` or `target_port` must be specified.
            example: 1fb12a1a-a1a5-4732-9a2e-635ba6ec8d3b
            x-nullable: true
          port:
            type: string
            format: uuid
            description: Endpoint port target. One of `target_network`, `target_subnet` or `target_port` must be specified.
            example: b2accf1a-1c99-4b54-9eeb-22be53f177f5
            x-nullable: true
      ip_address:
        readOnly: true
        type: string
        description: Endpoint IP address (IPv4 or IPv6).
        example: 1.2.3.4
      tags:
        type: array
        description: The list of tags on the resource.
        x-nullable: true
        items:
          type: string
          maxLength: 128
      status:
        $ref: "#/definitions/EndpointStatus"
      connection_mirroring:
        type: boolean
        default: false
        description: |
          **Note: This option currently only affects endpoints for services with provider type `tenant`.**

          Enable BIG-IP connection mirroring for high availability failover.
          When enabled, connection and persistence information is mirrored to
          the standby device in a DSC configuration.
          Enabling mirroring can increase latency of the endpoint.
      created_at:
        $ref: "#/definitions/Timestamp"
      updated_at:
        $ref: "#/definitions/Timestamp"
      project_id:
        $ref: "#/definitions/Project"
  EndpointStatus:
    type: string
    description: |
      Status of the endpoint

      ### Status can be one of
      | Status             | Description                           |
      | ------------------ | ------------------------------------- |
      | AVAILABLE          | Endpoint is available for consumption  |
      | PENDING_APPROVAL   | Endpoint is waiting for approval      |
      | PENDING_CREATE     | Endpoint is being set up              |
      | PENDING_UPDATE     | Endpoint is being updated             |
      | PENDING_REJECTED   | Endpoint is being rejected            |
      | PENDING_DELETE     | Endpoint is being deleted             |
      | REJECTED           | Endpoint was rejected                 |
      | FAILED             | Endpoint setup failed                 |
    enum:
      - AVAILABLE
      - PENDING_APPROVAL
      - PENDING_CREATE
      - PENDING_UPDATE
      - PENDING_REJECTED
      - PENDING_DELETE
      - REJECTED
      - FAILED
    readOnly: true
  RBACPolicyCommon:
    x-go-name: rbacpolicycommon
    required:
      - target
    type: object
    properties:
      id:
        type: string
        format: uuid
        description: The ID of the resource.
        readOnly: true
      target_type:
        type: string
        enum:
          - project
        default: project
      target:
        description: The ID of the project to which the RBAC policy will be enforced.
        type: string
        example: 666da95112694b37b3efb0913de3f499
        maxLength: 36
      project_id:
        $ref: "#/definitions/Project"
  RBACPolicy:
    x-go-name: rbacpolicy
    required:
      - service_id
    type: object
    properties:
      id:
        type: string
        format: uuid
        description: The ID of the resource.
        readOnly: true
      target_type:
        type: string
        enum:
          - project
        default: project
      target:
        description: The ID of the project to which the RBAC policy will be enforced.
        type: string
        example: 666da95112694b37b3efb0913de3f499
        maxLength: 36
      service_id:
        type: string
        format: uuid
        description: The ID of the service resource.
      created_at:
        $ref: "#/definitions/Timestamp"
      updated_at:
        $ref: "#/definitions/Timestamp"
      project_id:
        $ref: "#/definitions/Project"
  Quota:
    type: object
    properties:
      service:
        type: integer
        format: int64
        description: The configured service quota limit. A setting of null means it is using the deployment default quota. A setting of -1 means unlimited.
        example: 5
        minimum: -1
        x-nullable: false
      endpoint:
        type: integer
        format: int64
        description: The configured endpoint quota limit. A setting of null means it is using the deployment default quota. A setting of -1 means unlimited.
        example: 5
        minimum: -1
        x-nullable: false
  Project:
    type: string
    description: The ID of the project owning this resource.
    example: fa84c217f361441986a220edf9b1e337
    maxLength: 36
    x-omitempty: false
  QuotaUsage:
    type: object
    properties:
      in_use_service:
        type: integer
        description: The current quota usage of services.
        example: 5
        x-omitempty: false
      in_use_endpoint:
        type: integer
        description: The current quota usage of endpoints.
        example: 5
        x-omitempty: false
  Version:
    type: object
    description: Keystone-compatible version information
    properties:
      id:
        type: string
        description: Version identifier
        example: v1
      status:
        type: string
        description: Version status (CURRENT, SUPPORTED, DEPRECATED, EXPERIMENTAL)
        example: CURRENT
      updated:
        type: string
        description: Last update of the running version
        example: "2018-09-30T00:00:00Z"
      version:
        type: string
        description: Version of Archer (max microversion)
        example: 1.3.0
      links:
        type: array
        items:
          $ref: "#/definitions/Link"
      capabilities:
        type: array
        example: ["pagination", "sort"]
        items:
          type: string
  Versions:
    type: object
    description: Keystone-compatible versions response wrapper with backward-compatible root fields
    properties:
      versions:
        type: array
        description: Keystone-compatible versions array
        items:
          $ref: "#/definitions/Version"
      # Backward-compatible root-level fields (deprecated, use versions array instead)
      updated:
        type: string
        description: Last update of the running version (deprecated, use versions[].updated)
        example: "2018-09-30T00:00:00Z"
      version:
        type: string
        description: Version of Archer (deprecated, use versions[].version)
        example: 1.3.0
      links:
        type: array
        description: API links (deprecated, use versions[].links)
        items:
          $ref: "#/definitions/Link"
      capabilities:
        type: array
        description: Supported capabilities (deprecated, use versions[].capabilities)
        example: ["pagination", "sort"]
        items:
          type: string
  Timestamp:
    type: object
    x-go-type:
      type: time.Time
      hints:
        noValidation: true
    format: dateTime
    description: The UTC date and timestamp.
    readOnly: true
    example: 2023-03-31T18:37:54.581099Z
  Error:
    type: object
    properties:
      code:
        type: integer
        x-nullable: false
      message:
        type: string
        x-nullable: false
  Link:
    type: object
    properties:
      href:
        type: string
        example: /
      rel:
        type: string
        example: self
  Agent:
    type: object
    properties:
      host:
        type: string
        description: The hostname of the agent.
        example: agent-host-01
        readOnly: true
      availability_zone:
        type: string
        description: Availability zone of this agent.
        example: AZ-A
        x-nullable: true
        x-omitempty: false
      provider:
        type: string
        description: Provider type of the agent.
        example: tenant
        enum:
          - tenant
          - cp
      enabled:
        type: boolean
        description: Whether the agent is enabled.
        default: true
      physnet:
        type: string
        description: Physical network the agent is connected to.
        x-nullable: true
        x-omitempty: false
      created_at:
        $ref: "#/definitions/Timestamp"
      updated_at:
        $ref: "#/definitions/Timestamp"
      heartbeat_at:
        $ref: "#/definitions/Timestamp"
      services:
        type: integer
        format: int64
        description: Number of services hosted by this agent.
        readOnly: true
        x-omitempty: false
